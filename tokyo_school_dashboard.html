<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>東京の学校選びダッシュボード</title>
<style>
:root {
  --bg:#f6f8fb; --card:#fff; --text:#1f2937; --muted:#6b7280; --line:#e5e7eb;
  --brand:#1f4e79; --brand2:#3b82f6; --warn:#b91c1c; --warnbg:#fef2f2; --ok:#065f46;
  --chip:#eef2ff; --shadow:0 10px 30px rgba(15,23,42,.08); --excluded:#eef0f3; --excluded-border:#cfd6dd;
}
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans JP","PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); }
header { background:linear-gradient(135deg,var(--brand),#274c77 60%, #1e3a8a); color:#fff; padding:28px 20px 22px; }
.wrap { max-width:1400px; margin:0 auto; }
h1 { margin:0 0 10px; font-size:28px; }
.sub { opacity:.94; line-height:1.7; max-width:1000px; }
.langbar { margin-top:14px; display:flex; gap:8px; flex-wrap:wrap; }
.langbtn { border:1px solid rgba(255,255,255,.35); background:rgba(255,255,255,.12); color:#fff; border-radius:999px; padding:8px 14px; font-weight:800; cursor:pointer; }
.langbtn.active { background:#fff; color:#163a63; }
.topbar { display:grid; grid-template-columns: 330px 1fr; gap:18px; padding:18px 20px; max-width:1400px; margin:0 auto; align-items:start; }
.panel { background:var(--card); border:1px solid var(--line); border-radius:18px; box-shadow:var(--shadow); }
.filters { padding:18px; position:sticky; top:14px; }
.filters h2, .results h2 { margin:0 0 14px; font-size:18px; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
label { display:block; font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px; }
input[type="search"], select, textarea {
  width:100%; border:1px solid #d1d5db; border-radius:12px; padding:10px 12px; font-size:14px; background:#fff;
}
input[type="checkbox"] { transform:translateY(1px); }
.row { margin-bottom:12px; }
.actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
button {
  border:none; border-radius:12px; padding:10px 14px; font-weight:700; cursor:pointer;
  background:var(--brand); color:#fff;
}
button.secondary { background:#eef2ff; color:#3730a3; }
button.ghost { background:#f3f4f6; color:#111827; }
.results { padding:18px; min-height:70vh; }
.summary {
  display:grid; grid-template-columns: repeat(5,minmax(0,1fr)); gap:12px; margin-bottom:16px;
}
.metric { background:#f8fafc; border:1px solid var(--line); border-radius:14px; padding:14px; }
.metric .k { font-size:12px; color:var(--muted); margin-bottom:6px; }
.metric .v { font-size:24px; font-weight:800; }
.list { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:14px; }
.card { background:#fff; border:1px solid var(--line); border-radius:18px; padding:16px; box-shadow:var(--shadow); display:flex; flex-direction:column; gap:12px; }
.card.shortlisted { outline:3px solid #bfdbfe; }
.card.excluded {
  background:linear-gradient(180deg,#f8fafc 0%, var(--excluded) 100%);
  border:1px solid var(--excluded-border);
  opacity:.92;
}
.card.excluded h3, .card.excluded .memo { color:#4b5563; }
.card.excluded .notes { background:#f3f4f6; }
.statusbar { display:flex; gap:8px; flex-wrap:wrap; }
.statuspill {
  display:inline-flex; align-items:center; gap:6px; border-radius:999px; padding:6px 10px; font-size:12px; font-weight:800;
}
.statuspill.excluded { background:#e5e7eb; color:#374151; }
.statuspill.warn { background:var(--warnbg); color:var(--warn); }
.card h3 { margin:0; font-size:18px; line-height:1.4; }
.meta { display:flex; gap:8px; flex-wrap:wrap; }
.chip { background:var(--chip); color:#3730a3; padding:6px 10px; border-radius:999px; font-size:12px; font-weight:700; }
.chip.gray { background:#f3f4f6; color:#374151; }
.chip.warn { background:var(--warnbg); color:var(--warn); }
.kv { display:grid; grid-template-columns: 118px 1fr; gap:8px; font-size:14px; }
.kv div:nth-child(odd) { color:var(--muted); font-weight:700; }
.memo { font-size:14px; line-height:1.7; }
.concerns { background:var(--warnbg); border:1px solid #fecaca; border-radius:14px; padding:12px; }
.concerns h4 { margin:0 0 8px; color:var(--warn); font-size:13px; }
.concerns ul { margin:0; padding-left:18px; }
.concerns li { margin:4px 0; color:var(--warn); }
.excludedBox { background:#f3f4f6; border:1px dashed #9ca3af; border-radius:14px; padding:12px; color:#374151; font-size:13px; line-height:1.6; }
.links { display:flex; gap:8px; flex-wrap:wrap; }
.links a {
  text-decoration:none; border:1px solid #dbeafe; background:#eff6ff; color:#1d4ed8;
  padding:8px 10px; border-radius:10px; font-size:13px; font-weight:700;
}
.notes {
  background:#fafafa; border:1px dashed #d1d5db; border-radius:14px; padding:10px;
}
.small { color:var(--muted); font-size:12px; }
.empty { text-align:center; color:var(--muted); padding:50px 20px; }
footer { max-width:1400px; margin:18px auto 40px; color:var(--muted); font-size:12px; padding:0 20px; line-height:1.6; }
@media (max-width: 1100px) {
  .topbar { grid-template-columns:1fr; }
  .filters { position:static; }
}
@media (max-width: 800px) {
  .summary { grid-template-columns:1fr 1fr; }
  .grid2 { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1 id="title"></h1>
    <div class="sub" id="subtitle"></div>
    <div class="langbar">

<div class="topbar">

    <div class="row"><label><input type="checkbox" id="hideExcluded" /> <span id="labelHideExcluded"></span></label></div>
    <div class="actions">
      <button id="resetBtn" class="ghost"></button>
      <button id="exportBtn" class="secondary"></button>
    </div>
    <div class="small" id="helpText" style="margin-top:14px;"></div>
  </aside>

  <main class="panel results">
    <h2 id="resultsTitle"></h2>
    <div class="summary" id="summary"></div>
    <div class="list" id="list"></div>
    <div class="empty" id="empty" hidden></div>
  </main>
</div>

<footer id="footerText"></footer>

function saveState() {
  localStorage.setItem("tokyo-school-dashboard-state", JSON.stringify(state));
}

function tr(path) {
  const parts = path.split(".");
  let cur = I18N[state.lang];
  for (const p of parts) cur = cur[p];
  return cur;
}

function textOf(field) {
  if (!field) return "";
  if (typeof field === "string") return field;
  return field[state.lang] || field.ja || field.zh || "";
}

function currency(v) {
  if (v === null || v === undefined || v === "") return "—";
  const s = String(v).trim();
  const digits = s.replace(/[^0-9.]/g, "");
  if (digits && /^\d+(\.\d+)?$/.test(digits) && s === digits) {
    return "¥" + Number(digits).toLocaleString("en-US");
  }
  return s;
}

function priorityScore(v) {
  return (String(v || "").match(/★/g) || []).length;
}

function uniqueValues(key) {
  const vals = new Set();
  schools.forEach(s => vals.add(textOf(s[key])));
  return Array.from(vals).filter(Boolean).sort((a,b)=>a.localeCompare(b, state.lang === "ja" ? "ja" : "zh"));
}

function setupSelect(select, values) {
  select.innerHTML = `<option value="">${tr("all")}</option>` + values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("");
}

function escapeHtml(str) {
  return String(str ?? "").replace(/[&<>"]/g, s => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[s]));
}

function applyLanguage() {
  const t = I18N[state.lang];
  document.documentElement.lang = state.lang === "ja" ? "ja" : "zh-CN";
  els.title.textContent = t.title;
  els.subtitle.textContent = t.subtitle;
  els.filterTitle.textContent = t.filterTitle;
  els.labelSearch.textContent = t.labelSearch;
  els.search.placeholder = t.searchPlaceholder;
  els.labelCategory.textContent = t.labelCategory;
  els.labelWard.textContent = t.labelWard;
  els.labelGender.textContent = t.labelGender;
  els.labelIB.textContent = t.labelIB;
  els.labelChinese.textContent = t.labelChinese;
  els.labelPriority.textContent = t.labelPriority;
  els.labelSort.textContent = t.labelSort;
  els.labelOnlyShortlist.textContent = t.labelOnlyShortlist;
  els.labelOnlyConcerns.textContent = t.labelOnlyConcerns;
  els.labelHideExcluded.textContent = t.labelHideExcluded;
  els.resetBtn.textContent = t.resetBtn;
  els.exportBtn.textContent = t.exportBtn;
  els.helpText.textContent = t.helpText;
  els.resultsTitle.textContent = t.resultsTitle;
  els.empty.textContent = t.empty;
  els.footerText.textContent = t.footerText;
  els.langJa.classList.toggle("active", state.lang === "ja");
  els.langZh.classList.toggle("active", state.lang === "zh");

  setupSelect(els.category, uniqueValues("category"));
  setupSelect(els.ward, uniqueValues("ward"));
  setupSelect(els.gender, uniqueValues("gender"));
  setupSelect(els.ibCertified, Array.from(new Set(schools.map(s => s.ibCertified))).filter(Boolean));
  setupSelect(els.chinese, uniqueValues("chinese"));
  setupSelect(els.priority, Array.from(new Set(schools.map(s => s.priority))).filter(Boolean).sort((a,b)=>priorityScore(b)-priorityScore(a)));
  els.sort.innerHTML = Object.entries(t.sortOptions).map(([k,v]) => `<option value="${k}">${v}</option>`).join("");
  if (!["priority","name","feeAsc","feeDesc","concerns"].includes(els.sort.value)) els.sort.value = "priority";
}

}

function matches(s, f) {
  const blob = [textOf(s.name), textOf(s.ward), textOf(s.area), textOf(s.category), textOf(s.curriculum), textOf(s.memo), textOf(s.notes), (state.notes[s.id]||"")].join(" ").toLowerCase();
  if (f.search && !blob.includes(f.search)) return false;
  if (f.category && textOf(s.category) !== f.category) return false;
  if (f.ward && textOf(s.ward) !== f.ward) return false;
  if (f.gender && textOf(s.gender) !== f.gender) return false;
  if (f.ibCertified && s.ibCertified !== f.ibCertified) return false;
  if (f.chinese && textOf(s.chinese) !== f.chinese) return false;
  if (f.priority && s.priority !== f.priority) return false;
  if (f.onlyShortlist && !state.shortlist[s.id]) return false;
  if (f.onlyConcerns && !(s.concerns && s.concerns.length)) return false;
  if (f.hideExcluded && s.excluded) return false;
  return true;
}

function sortSchools(list, sortKey) {
  return [...list].sort((a,b) => {
    if (sortKey === "name") return textOf(a.name).localeCompare(textOf(b.name), state.lang === "ja" ? "ja" : "zh");
    if (sortKey === "feeAsc") return feeNumber(a.totalFee) - feeNumber(b.totalFee);
    if (sortKey === "feeDesc") return feeNumber(b.totalFee) - feeNumber(a.totalFee);
    if (sortKey === "concerns") return (b.concerns?.length || 0) - (a.concerns?.length || 0);
    return priorityScore(b.priority) - priorityScore(a.priority) || (a.excluded - b.excluded) || textOf(a.name).localeCompare(textOf(b.name), state.lang === "ja" ? "ja" : "zh");
  });
}

function feeNumber(v) {
  const digits = String(v || "").replace(/[^0-9.]/g, "");
  return digits ? Number(digits) : Infinity;
}

function renderSummary(list) {
  const total = list.length;
  const shortlisted = list.filter(s => state.shortlist[s.id]).length;
  const withConcerns = list.filter(s => s.concerns && s.concerns.length).length;
  const excluded = list.filter(s => s.excluded).length;
  const inter = list.filter(s => textOf(s.category).includes(state.lang === "ja" ? "インター" : "国际")).length;
  const t = tr("summary");
  els.summary.innerHTML = `
    <div class="metric"><div class="k">${t.total}</div><div class="v">${total}</div></div>
    <div class="metric"><div class="k">${t.shortlisted}</div><div class="v">${shortlisted}</div></div>
    <div class="metric"><div class="k">${t.concerns}</div><div class="v">${withConcerns}</div></div>
    <div class="metric"><div class="k">${t.excluded}</div><div class="v">${excluded}</div></div>
    <div class="metric"><div class="k">${t.inter}</div><div class="v">${total ? Math.round(inter/total*100) : 0}%</div></div>
  `;
}

function renderList() {
  const f = currentFilters();
  const filtered = sortSchools(schools.filter(s => matches(s, f)), f.sort);
  renderSummary(filtered);
  els.empty.hidden = filtered.length !== 0;
  const labels = tr("labels");
  els.list.innerHTML = filtered.map(s => {
    const shortlisted = !!state.shortlist[s.id];
    const concerns = (s.concerns || []).map(c => `<li><strong>${escapeHtml(c.field)}:</strong> ${escapeHtml(currency(c.value))}</li>`).join("");
    const links = [
      s.site ? `<a href="${escapeHtml(s.site)}" target="_blank" rel="noopener">${tr("links.site")}</a>` : "",
      s.instagram ? `<a href="${escapeHtml(s.instagram)}" target="_blank" rel="noopener">${tr("links.instagram")}</a>` : "",
      s.facebook ? `<a href="${escapeHtml(s.facebook)}" target="_blank" rel="noopener">${tr("links.facebook")}</a>` : ""
    ].filter(Boolean).join("");
    const note = state.notes[s.id] || "";
    return `
      <section class="card ${shortlisted ? "shortlisted" : ""} ${s.excluded ? "excluded" : ""}">
        <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;">
          <h3>${escapeHtml(textOf(s.name))}</h3>
          <button class="secondary" onclick="toggleShortlist(${s.id})">${shortlisted ? tr("shortlistOn") : tr("shortlistAdd")}</button>
        </div>
        <div class="statusbar">
          ${s.excluded ? `<span class="statuspill excluded">${tr("excludedChip")}</span>` : ""}
          ${s.concerns?.length ? `<span class="statuspill warn">${tr("concernChip")(s.concerns.length)}</span>` : ""}
        </div>
        <div class="meta">
          <span class="chip">${escapeHtml(textOf(s.category))}</span>
          <span class="chip gray">${escapeHtml(textOf(s.ward))} / ${escapeHtml(textOf(s.area))}</span>
          <span class="chip gray">${escapeHtml(textOf(s.gender))}</span>
          <span class="chip gray">${escapeHtml(s.priority || "")}</span>
          ${s.ibCertified === "✅" ? `<span class="chip">${tr("yesIB")}</span>` : `<span class="chip gray">${tr("noIB")}</span>`}
          ${["あり","有","あり（DP段階）"].includes(textOf(s.chinese)) ? `<span class="chip">${escapeHtml(textOf(s.chinese))}</span>` : ""}
        </div>
        <div class="kv">
          <div>${labels.grades}</div><div>${escapeHtml(textOf(s.grades) || "—")}</div>
          <div>${labels.curriculum}</div><div>${escapeHtml(textOf(s.curriculum) || "—")}</div>
          <div>${labels.ibLevel}</div><div>${escapeHtml(textOf(s.ibLevel) || "—")}</div>
          <div>${labels.totalFee}</div><div>${escapeHtml(currency(s.totalFee))}</div>
          <div>${labels.annualFee}</div><div>${escapeHtml(currency(s.annualFee))}</div>
          <div>${labels.oneTimeFee}</div><div>${escapeHtml(currency(s.oneTimeFee))}</div>
          <div>${labels.notes}</div><div>${escapeHtml(textOf(s.notes) || "—")}</div>
        </div>
        <div class="memo">${escapeHtml(textOf(s.memo) || "")}</div>
        ${s.excluded ? `<div class="excludedBox">${tr("excludedReason")}</div>` : ""}
        ${concerns ? `<div class="concerns"><h4>${tr("concernsTitle")}</h4><ul>${concerns}</ul></div>` : ""}
        <div class="links">${links || '<span class="small">—</span>'}</div>
        <div class="notes">
          <label for="note-${s.id}">${tr("addNote")}</label>
          <textarea id="note-${s.id}" rows="3" placeholder="${tr("notePlaceholder")}" oninput="updateNote(${s.id}, this.value)">${escapeHtml(note)}</textarea>
        </div>
      </section>
    `;
  }).join("");
}

function toggleShortlist(id) {
  state.shortlist[id] = !state.shortlist[id];
  if (!state.shortlist[id]) delete state.shortlist[id];
  saveState();
  renderList();
}

function updateNote(id, value) {
  state.notes[id] = value;
  saveState();
}

function exportShortlist() {
  const selected = schools.filter(s => state.shortlist[s.id]).map(s => ({
    school: textOf(s.name),
    area: `${textOf(s.ward)} / ${textOf(s.area)}`,
    category: textOf(s.category),
    grades: textOf(s.grades),
    totalFee: currency(s.totalFee),
    excluded: s.excluded,
    concerns: (s.concerns || []).map(c => `${c.field}: ${currency(c.value)}`).join(" / "),
    familyNote: state.notes[s.id] || "",
    site: s.site || ""
  }));
  const blob = new Blob([JSON.stringify(selected, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "school-shortlist.json";
  a.click();
  URL.revokeObjectURL(a.href);
}

els.langJa.addEventListener("click", ()=>{state.lang="ja"; saveState(); applyLanguage(); renderList();});
els.langZh.addEventListener("click", ()=>{state.lang="zh"; saveState(); applyLanguage(); renderList();});
els.resetBtn.addEventListener("click", () => {
  els.search.value = "";
  [els.category,els.ward,els.gender,els.ibCertified,els.chinese,els.priority].forEach(el => el.value = "");
  els.sort.value = "priority";
  els.onlyShortlist.checked = false;
  els.onlyConcerns.checked = false;
  els.hideExcluded.checked = false;
  renderList();
});
els.exportBtn.addEventListener("click", exportShortlist);
[els.search,els.category,els.ward,els.gender,els.ibCertified,els.chinese,els.priority,els.sort,els.onlyShortlist,els.onlyConcerns,els.hideExcluded].forEach(el => {
  el.addEventListener("input", renderList);
  el.addEventListener("change", renderList);
});

applyLanguage();
els.sort.value = "priority";
renderList();
window.toggleShortlist = toggleShortlist;
window.updateNote = updateNote;
</script>
</body>
</html>
